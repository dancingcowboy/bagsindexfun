      uri: ./build/app-release.apk

  catalog:
    en-US:
      name: Bags Index
      short_description: Index fund for Bags tokens on Solana
      long_description: |
        Bags Index is the first index fund for tokens launched on Bags.fm.
        Deposit SOL once and the on-chain agent automatically allocates across
        the top tokens by composite score (volume, holder growth, liquidity,
        safety). Three risk tiers — Conservative, Balanced, Degen — each with
        a √-weighted basket that rebalances on a fixed schedule.

        Features:
          - Deposit SOL, withdraw any time
          - Three risk tiers with separate vaults
          - Automatic rebalancing via on-chain agent
          - Live performance charts and AI-generated market commentary
          - Mobile Wallet Adapter — connect Phantom, Solflare, or Seed Vault

        Non-custodial: your sub-wallet is yours, the agent only routes trades
        you authorize on connect.
      new_in_version: |
        Initial release.
      saga_features_localized: |
        Native Mobile Wallet Adapter integration. Works with Seed Vault on
        Seeker for hardware-backed signing.

solana_mobile_dapp_publisher_portal:
  google_store_package: ""
  testing_instructions: |
    1. Install the app and tap Connect Wallet on the Portfolio tab.
    2. Authorize with any MWA-compatible wallet (Phantom, Solflare, Seed Vault).
    3. Deposit a small amount of SOL (0.05+) to a sub-wallet of your choice.
    4. Watch the holdings populate after the next rebalance tick (~minutes).
    5. Withdraw to verify funds return to your main wallet.
